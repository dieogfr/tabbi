<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link
      rel="icon"
      type="image/png"
      href="images/icons/light.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="images/icons/dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="stylesheet" href="css/newtab.css" />
  </head>
  <body>
    <main id="bookmarks-container">
      <div id="bookmarks" class="bookmarks-grid"></div>
    </main>
    <footer>
      <div class="footer-left">
        <div id="datetime-time" class="datetime-time"></div>
        <div id="datetime-date" class="datetime-date"></div>
      </div>
      <div class="footer-right">
        <div id="system-info" class="system-info"></div>
        <div id="connection-status">
          <span id="status-text">Connected</span>
        </div>
      </div>
    </footer>
    <script src="js/newtab.js" type="module"></script>
  </body>
</html>
